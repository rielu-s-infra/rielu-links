apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rielu-site
  namespace: rielu-site
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # 以下の2行を追加
    nginx.ingress.kubernetes.io/backend-protocol: "HTTP"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  ingressClassName: public
  rules:
    - host: rieluofficial.uniproject.jp
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rielu-site
                port:
                  number: 3000
  tls:
    - hosts:
        - rieluofficial.uniproject.jp
      secretName: rieluofficial-uniproject-jp-tls

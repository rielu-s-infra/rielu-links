apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: rielu-links-updater
  namespace: argocd
spec:
  writeBackConfig:
    method: "git"
    gitConfig:
      repository: "https://github.com/rielu-s-infra/rielu-homepage.git"
      branch: "main"
      writeBackTarget: "helmvalues:./argoCD/values.yaml"
  applicationRefs:
    - namePattern: "rielu-links"
      images:
        - alias: "app"
          imageName: "docker.io/rieluinfra/rielu-links"
          commonUpdateSettings:
            updateStrategy: "latest"
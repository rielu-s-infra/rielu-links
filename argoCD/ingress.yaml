apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rielu-site
  namespace: rielu-site
  annotations:
    cert-manager.io/cluster-issuer: cf-prod
spec:
  ingressClassName: public
  rules:
    - host: rielu.uniproject.jp
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rielu-site
                port:
                  number: 3000
  tls:
    - hosts:
        - rielu.uniproject.jp
      secretName: rielu-uniproject-jp-tls

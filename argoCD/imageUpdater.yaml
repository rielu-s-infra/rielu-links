apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rielu-links
  namespace: argocd
  annotations:
    # Image Updaterの設定（注釈として記述）
    argocd-image-updater.argoproj.io/image-list: app=docker.io/rieluinfra/rielu-links
    argocd-image-updater.argoproj.io/rielu-links.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git
spec:
  project: default
  source:
    repoURL: 'https://github.com/rielu-s-infra/rielu-links.git' # ←ここを書き換え
    targetRevision: master
    path: 'argoCD' # ←ここを書き換え
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: rielu-links # ←デプロイ先のNamespace
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
